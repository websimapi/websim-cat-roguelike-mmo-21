<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Roguelike MMO</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* Forced Landscape Mode for Mobile Portrait */
        /* Only apply to devices with width < 760px (Phones), preventing Tablets from forcing rotation */
        @media screen and (orientation: portrait) and (max-width: 760px) {
            #game-container {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 100vh; /* Swap width/height */
                height: 100vw;
                /* Rotate 90deg to force landscape view */
                transform: translate(-50%, -50%) rotate(90deg);
            }
        }

        canvas {
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            outline: none; /* Remove blue focus outline */
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
        }
        #chat-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            max-width: 90%;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            border-radius: 8px;
            padding: 15px;
            color: white;
            display: none;
            pointer-events: auto;
        }
        #npc-name {
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }
        #npc-text {
            font-size: 16px;
            line-height: 1.4;
        }
        .interaction-prompt {
            position: absolute;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 100;
        }
        #loading {
            position: absolute;
            color: white;
            font-size: 24px;
            z-index: 3000;
            pointer-events: none;
        }
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            pointer-events: auto;
            z-index: 2001;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        #close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            display: none; /* Hidden by default */
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            z-index: 4000;
            pointer-events: auto;
            transition: opacity 0.5s;
        }
        #hud-container {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            pointer-events: none;
            z-index: 2500;
        }
        #hud-ring-layer {
            position: absolute;
            top: 0;
            left: 0;
        }
        #hud-portrait-container {
            position: absolute;
            top: 15px; /* (100 - 70) / 2 */
            left: 15px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: transparent;
            overflow: hidden;
            border: none;
            box-shadow: none;
        }
        #party-list {
            position: absolute;
            top: 120px;
            left: 35px; /* Align roughly center with the 100px HUD above (100/2 - 40/2 + 20 margin approx) */
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            z-index: 2500;
        }
        .party-member {
            width: 50px;
            height: 50px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .crown-icon {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            text-shadow: 0 1px 2px black;
            z-index: 10;
        }
        
        #target-hud {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            display: none; /* Hidden by default */
            pointer-events: auto;
            z-index: 2500;
        }
        #target-ring-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 100px;
            pointer-events: none;
        }
        #target-portrait-container {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            pointer-events: auto;
            background: transparent;
            border: none;
            box-shadow: none;
        }
        #target-name {
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 100%;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #target-dropdown {
            position: absolute;
            top: 90px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #fff;
            border-radius: 4px;
            display: none;
            flex-direction: column;
            min-width: 100px;
            z-index: 2600;
        }
        #self-dropdown {
            position: absolute;
            top: 90px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #fff;
            border-radius: 4px;
            display: none;
            flex-direction: column;
            min-width: 100px;
            z-index: 2600;
        }
        .dropdown-item {
            padding: 8px 12px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 1px solid #444;
            text-align: center;
        }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover { background: #333; }
        
        .btn-action {
            background: #4CAF50;
            color: white;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        .btn-action:disabled {
            background: #555;
            color: #aaa;
            cursor: not-allowed;
        }

        #invite-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #fff;
            border-radius: 8px;
            padding: 20px;
            color: white;
            display: none;
            z-index: 4000;
            text-align: center;
            pointer-events: auto;
            min-width: 250px;
        }
        #invite-modal h3 { margin-top: 0; }
        .modal-btns {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        
        #focus-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 2500;
            pointer-events: none;
        }
        /* Remove box shadow / background from HUD canvases so the PFP area has no visible square */
        #ui-layer canvas {
            box-shadow: none !important;
            background: transparent !important;
            border: none !important;
        }
        #hud-ring-layer,
        #hud-portrait-layer {
            box-shadow: none;
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="bgCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;"></canvas>
        <div id="loading">Tap to Start</div>
        <canvas id="gameCanvas" style="position: relative; z-index: 1; width: 100%; height: 100%;"></canvas>
        <div id="focus-overlay"></div>
        <div id="ui-layer">
            <div id="hud-container">
                <div id="my-crown" class="crown-icon" style="display:none; font-size: 24px; top: -15px;">👑</div>
                <canvas id="hud-ring-layer" width="100" height="100"></canvas>
                <div id="hud-portrait-container">
                    <canvas id="hud-portrait-layer" width="70" height="70"></canvas>
                </div>
                <div id="self-dropdown">
                    <div id="btn-leave" class="dropdown-item">Leave Party</div>
                    <div id="btn-disband" class="dropdown-item">Disband Party</div>
                </div>
            </div>
            <div id="party-list">
                <!-- Party members injected here -->
            </div>
            
            <div id="target-hud">
                <div id="target-ring-container">
                    <canvas id="target-ring-canvas" width="100" height="100"></canvas>
                </div>
                <div id="target-portrait-container">
                    <canvas id="target-portrait-canvas" width="70" height="70"></canvas>
                </div>
                <div id="target-name">Player</div>
                <div id="target-dropdown">
                    <div id="btn-invite" class="dropdown-item">Invite to Party</div>
                </div>
            </div>

            <div id="invite-modal">
                <h3 id="invite-msg">Party Invite</h3>
                <div class="modal-btns">
                    <button id="btn-accept" class="btn-action" style="background:#27ae60;">Accept</button>
                    <button id="btn-decline" class="btn-action" style="background:#c0392b;">Decline</button>
                </div>
            </div>

            <div id="joystick-zone"></div>
            <div id="interaction-label" class="interaction-prompt">Press 'T' to Talk</div>
            <div id="chat-box">
                <div id="npc-name">Shopkeeper</div>
                <div id="npc-text">...</div>
            </div>
            <div id="close-btn">X</div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>

</body>
</html>
